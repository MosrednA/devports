name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        devports is Windows-only. Do not include secrets or private command-line arguments.

  - type: input
    id: version
    attributes:
      label: devports version
      placeholder: Output of devports version
    validations:
      required: true

  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: Output of node --version
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
