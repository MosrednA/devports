name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os-name }} / Node.js ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-name: Windows
            node: 22
          - os: windows-latest
            os-name: Windows
            node: 24
          - os: ubuntu-latest
            os-name: Linux
            node: 22
          - os: ubuntu-latest
            os-name: Linux
            node: 24

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm pack --dry-run
